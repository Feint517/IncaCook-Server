name: IncaCook

services:
  redis:
    image: redis:7-alpine
    container_name: IncaCook-redis
    ports:
      - '6380:6379'
    volumes:
      - incacook-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  incacook-redis-data:
